name: 全池扫描分析

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制
concurrency:
  group: stock-analysis-weekly
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # (保持你原来那一大堆 env 不变...)
          # 关键修改：指向全池变量
          STOCK_LIST_CONFIG: ${{ vars.FULL_POOL_LIST }}
          # ... (其余环境变量保持和你原来一样)
        run: |
          # 保持原来的 bash 脚本内容不变
          if [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          fi
          # ... (其余逻辑不变)
